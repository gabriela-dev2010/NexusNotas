<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - NexusNotas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --azul-principal: #1E88E5;
            --azul-oscuro: #0D47A1;
            --azul-claro: #42A5F5;
            --bg-dark: #0a192f;
            --error: #D32F2F;
            --success: #388E3C;
            --warning: #F57C00;
            --info: #0288D1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

       .auth-card {
            background: linear-gradient(135deg, #42A5F5 0%, #1E88E5 100%);
            border-radius: 25px;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

       .auth-card h1 {
            color: var(--azul-oscuro);
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 5px;
        }

       .subtitle {
            text-align: center;
            color: var(--azul-oscuro);
            opacity: 0.9;
            margin-bottom: 35px;
            font-size: 15px;
        }

        label {
            display: block;
            color: var(--azul-oscuro);
            font-weight: 600;
            margin-bottom: 6px;
            margin-top: 18px;
            font-size: 14px;
        }

       .input-group { position: relative; }

        input {
            width: 100%;
            padding: 15px 18px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            background: rgba(255,255,255,0.95);
            color: #1a237e;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.3);
            background: white;
        }

        input::placeholder { color: #90a4ae; }

       .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--azul-oscuro);
            opacity: 0.6;
        }

       .password-toggle:hover { opacity: 1; }

       .btn-submit {
            width: 100%;
            margin-top: 35px;
            padding: 16px;
            background: var(--azul-oscuro);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

       .btn-submit:hover {
            background: #0a357a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 71, 161, 0.4);
        }

       .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

       .alert-error { background: #FFEBEE; color: var(--error); border-left: 4px solid var(--error); }
       .alert-success { background: #E8F5E9; color: var(--success); border-left: 4px solid var(--success); }
       .alert-warning { background: #FFF3E0; color: var(--warning); border-left: 4px solid var(--warning); }
       .alert-info { background: #E1F5FE; color: var(--info); border-left: 4px solid var(--info); }

       .auth-link {
            text-align: center;
            margin-top: 30px;
            color: var(--azul-oscuro);
            font-size: 14px;
        }

       .auth-link a {
            color: white;
            font-weight: 700;
            text-decoration: none;
        }

       .auth-link a:hover { text-decoration: underline; }

       .forgot-password {
            text-align: right;
            margin-top: 8px;
        }

       .forgot-password a {
            color: var(--azul-oscuro);
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
        }

       .forgot-password a:hover { text-decoration: underline; }

        @media (max-width: 500px) {
           .auth-card { padding: 35px 25px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Bienvenido</h1>
        <p class="subtitle">Ingresa a tu cuenta NexusNotas</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required placeholder="tu@correo.com">

            <label for="password">Contraseña</label>
            <div class="input-group">
                <input type="password" id="password" name="password" required placeholder="Tu contraseña">
                <i class="fas fa-eye password-toggle" id="togglePassword"></i>
            </div>
            
            <div class="forgot-password">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-submit">Iniciar Sesión</button>
        </form>

        <p class="auth-link">¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate gratis</a></p>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('password');
        
        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password'? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
